version: '3.8'

services:
  postgres:
    build: .
    container_name: taekwondo-postgres
    restart: unless-stopped
    environment:
      # Основные настройки PostgreSQL (значения подтянутся из .env)
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

      # Настройки локализации
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=ru_RU.UTF-8"
      TZ: ${TZ}
      LANG: ru_RU.UTF-8
      LC_ALL: ru_RU.UTF-8

      # Настройки производительности
      POSTGRES_MAX_CONNECTIONS: ${MAX_CONNECTIONS:-200}
      POSTGRES_SHARED_BUFFERS: ${SHARED_BUFFERS:-256MB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${EFFECTIVE_CACHE_SIZE:-768MB}
      POSTGRES_WORK_MEM: ${WORK_MEM:-16MB}
      POSTGRES_MAINTENANCE_WORK_MEM: ${MAINTENANCE_WORK_MEM:-64MB}

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/scripts:ro
      - ./backups:/backups:rw
      - ./logs:/var/log/postgresql:rw

    networks:
      - taekwondo-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: taekwondo-pgadmin
    restart: unless-stopped
    environment:
      # Значения подтянутся из .env
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_DEFAULT_LOCALE: "'ru'"
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgpass:ro

    networks:
      - taekwondo-network
    depends_on:
      - postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backup:
    image: postgres:16-alpine
    container_name: taekwondo-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-"0 2 * * *"}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
    volumes:
      - ./backups:/backups:rw
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - ./scripts/restore.sh:/usr/local/bin/restore.sh:ro
      - ./scripts/list_backups.sh:/usr/local/bin/list_backups.sh:ro
      - ./scripts/backup_info.sh:/usr/local/bin/backup_info.sh:ro
    networks:
      - taekwondo-network
    depends_on:
      - postgres
    command: |
      sh -c "
      apk add --no-cache dcron
      echo '$${BACKUP_SCHEDULE} /usr/local/bin/backup.sh' > /var/spool/cron/crontabs/root
      chmod 600 /var/spool/cron/crontabs/root
      crond -f -l 2
      "

networks:
  taekwondo-network:
    driver: bridge
    name: taekwondo-network

volumes:
  postgres_data:
    name: taekwondo-postgres-data
  pgadmin_data:
    name: taekwondo-pgadmin-data
